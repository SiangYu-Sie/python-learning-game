<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyQuest - 畢松勇者傳說 | Python 遊戲化學習平台</title>
    <!-- Noto Sans TC for traditional chinese, Outfit for tech look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css?v=2.0.0">
</head>
<body>
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>

    <!-- 關卡地圖選擇頁面 -->
    <div class="view-container active" id="mapView">
        <div class="map-view-content">
            <header class="map-header">
                <div class="logo-area">
                    <h1 class="game-title-logo">PyQuest</h1>
                    <p class="game-subtitle">畢松勇者傳說 ｜ Python 魔法修煉地圖</p>
                </div>
                
                <div class="map-hero-profile">
                    <div class="avatar-box">
                        <i class="fa-solid fa-shield-halved"></i>
                    </div>
                    <div class="hero-stats">
                        <div class="hero-name">畢松勇者 <span id="mapHeroLevel">Lv.1</span></div>
                        <div class="stat-bar-container">
                            <div class="stat-label">EXP (經驗值)</div>
                            <div class="bar-outer">
                                <div class="bar-inner exp-bar" id="mapExpBar" style="width: 0%;"></div>
                            </div>
                            <span class="stat-val" id="mapExpValue">0 / 100</span>
                        </div>
                    </div>
                </div>
            </header>

            <main class="map-main">
                <h2 class="map-title"><i class="fa-solid fa-map-marked-alt"></i> 選擇修煉關卡挑戰</h2>
                <!-- 關卡地圖傳送點容器 -->
                <div class="full-quest-map" id="questMap"></div>
            </main>
            
            <footer class="map-footer">
                <button class="map-help-btn" id="helpBtn"><i class="fa-solid fa-circle-question"></i> 遊戲說明</button>
            </footer>
        </div>
    </div>

    <!-- Achievements & Level Up Modals (用於地圖頁新手導覽或成就展示) -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="game-modal" id="gameModal">
            <div class="modal-header">
                <i class="fa-solid fa-trophy" id="modalIcon"></i>
                <h3 id="modalTitle">解鎖成就！</h3>
            </div>
            <div class="modal-body" id="modalBody">
                恭喜獲得新稱號！
            </div>
            <button class="modal-close-btn" id="modalCloseBtn">繼續冒險</button>
        </div>
    </div>

    <!-- 引入地圖頁專用的輕量級 JS (不需要載入 Pyodide，啟動極速) -->
    <script src="map.js?v=2.0.0"></script>
</body>
</html>
